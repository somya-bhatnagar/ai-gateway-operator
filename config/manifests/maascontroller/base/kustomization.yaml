apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../crd
  - ../rbac
  - ../manager
  - ../webhook

labels:
  - pairs:
      app.kubernetes.io/name: maas-controller
      app.kubernetes.io/component: maas-controller
      app.kubernetes.io/part-of: models-as-a-service

configMapGenerator:
  - name: maas-controller-params
    envs:
      - params.env

replacements:
  - source:
      kind: ConfigMap
      name: maas-controller-params
      fieldPath: data.MAAS_CONTROLLER_IMAGE
    targets:
      - select:
          kind: Deployment
          name: maas-controller
        fieldPaths:
          - spec.template.spec.containers.[name=manager].image
  - source:
      kind: ConfigMap
      name: maas-controller-params
      fieldPath: data.MAAS_API_IMAGE
    targets:
      - select:
          kind: Deployment
          name: maas-controller
        fieldPaths:
          - spec.template.spec.containers.[name=manager].env.[name=RELATED_IMAGE_ODH_MAAS_API_IMAGE].value
  - source:
      kind: ConfigMap
      name: maas-controller-params
      fieldPath: data.PAYLOAD_PROCESSING_IMAGE
    targets:
      - select:
          kind: Deployment
          name: maas-controller
        fieldPaths:
          - spec.template.spec.containers.[name=manager].env.[name=RELATED_IMAGE_ODH_AI_GATEWAY_PAYLOAD_PROCESSING_IMAGE].value
  - source:
      kind: ConfigMap
      name: maas-controller-params
      fieldPath: data.MAAS_API_KEY_CLEANUP_IMAGE
    targets:
      - select:
          kind: Deployment
          name: maas-controller
        fieldPaths:
          - spec.template.spec.containers.[name=manager].env.[name=RELATED_IMAGE_UBI_MINIMAL_IMAGE].value
